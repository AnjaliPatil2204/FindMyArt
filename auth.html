<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Portal | Login & Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div id="authForm">
            <h2 id="formTitle">Artist Sign Up</h2>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            
            <div id="signUpDetails">
                <input type="text" id="artistName" placeholder="Business Name">
                <select id="artistCat">
                    <option value="Mehndi">Mehndi Artist</option>
                    <option value="Rangoli">Rangoli Artist</option>
                    <option value="Makeup">Makeup Artist</option>
                </select>
                <input type="text" id="artistLoc" placeholder="City (e.g. Pune)">
                <input type="text" id="artistPhone" placeholder="Phone Number">
            </div>

            <button id="authBtn" onclick="handleAuth()">Create Account</button>
            <p onclick="toggleAuthMode()" id="toggleText">Already have an account? Login</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
</body>
</html>
