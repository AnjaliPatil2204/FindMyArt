<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Artist | ArtisanConnect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <h2>Register as an Artist</h2>
        <div class="search-box" style="display: flex; flex-direction: column; max-width: 400px; margin: auto;">
            <input type="text" id="name" placeholder="Business Name (e.g. Priya Mehndi)">
            <select id="cat">
                <option value="Mehndi">Mehndi Artist</option>
                <option value="Rangoli">Rangoli Artist</option>
                <option value="Makeup">Makeup Artist</option>
            </select>
            <input type="text" id="loc" placeholder="City (e.g. Pune)">
            <input type="text" id="phone" placeholder="Phone Number">
            <button class="btn-primary" onclick="saveArtist()">Save Profile</button>
            <p id="status"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="auth.js"></script>
    <script>
        async function saveArtist() {
            const status = document.getElementById("status");
            status.innerText = "Saving...";

            const artistData = {
                name: document.getElementById("name").value,
                category: document.getElementById("cat").value,
                location: document.getElementById("loc").value,
                phone: document.getElementById("phone").value,
                createdAt: new Date()
            };

            try {
                // This adds a new document to your "artists" collection in Firestore
                await db.collection("artists").add(artistData);
                status.style.color = "green";
                status.innerText = "✅ Artist added successfully!";
                // Clear fields
                document.getElementById("name").value = "";
            } catch (error) {
                status.style.color = "red";
                status.innerText = "❌ Error: " + error.message;
            }
        }
    </script>
</body>
</html>
